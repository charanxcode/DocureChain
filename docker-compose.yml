version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: docurechain-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: docurechain
      POSTGRES_PASSWORD: docurechain_password
      POSTGRES_DB: docurechain_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U docurechain -d docurechain_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: docurechain-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
